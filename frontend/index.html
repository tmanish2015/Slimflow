<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slimflow Drawing Recognition Engine</title>
    <script>
      // shadcn's theme is class-based (.dark), not media-query-based — set it
      // before paint to avoid a flash. A saved user choice (from the toggle
      // in App.tsx) wins over system preference; otherwise fall back to it.
      const savedTheme = localStorage.getItem('theme')
      const wantsDark = savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
      if (wantsDark) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
